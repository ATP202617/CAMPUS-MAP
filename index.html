<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Custom Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Make the map fill the entire browser page */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Dark background behind the image */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Define image dimensions (Change these to match your actual image!)
        const imgWidth = 6000;
        const imgHeight = 4242;
        const imgUrl = 'my-map.png';

        // 2. Initialize the map with CRS.Simple (flat 2D coordinate system)
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1, // Allows zooming out to see the whole image
            maxZoom: 3,  // Allows zooming in closely
        });

        // 3. Define the coordinate bounds for the image.
        // Format is [[y_min, x_min], [y_max, x_max]].
        // Note: Leaflet maps coordinates as [Y, X] (equivalent to Lat, Lng).
        const southWest = map.unproject([0, imgHeight], map.getMaxZoom() - 1);
        const northEast = map.unproject([imgWidth, 0], map.getMaxZoom() - 1);
        const bounds = new L.LatLngBounds(southWest, northEast);

        // 4. Add the image overlay to the map
        L.imageOverlay(imgUrl, bounds).addTo(map);

        // Tell the map to fit the boundaries of our image and center it
        map.fitBounds(bounds);

        // 5. Add interactive markers (X, Y coordinates are based on your image pixels!)
        // Map points are added in [Y, X] format.
        
        // Marker 1
        const marker1 = L.marker([-750, 1000]).addTo(map); // Centers roughly in the middle
        marker1.bindPopup("<b>Castle Black</b><br>This is an interactive popup!");

        // Marker 2
        const marker2 = L.marker([-300, 400]).addTo(map);
        marker2.bindPopup("<b>Whispering Woods</b><br><img src='https://via.placeholder.com/100' width='100px'><br>You can even add images to popups.");

        // Helper tool: Click on the map to get coordinates in the console 
        // (Great for finding where to place markers on your image!)
        map.on('click', function(e) {
            console.log("Clicked coordinates: [" + e.latlng.lat + ", " + e.latlng.lng + "]");
        });
    </script>
</body>
</html>
